<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Book Appointment Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      /* Claude-like soft palette */
      --bg: #f3f2fa;
      --panel: #ffffff;
      --muted: #8d8da1;
      --line: #e7e6f1;

      --me: #c8b3ff; 
      --bot: #eceafb;
      --text: #262633;
      --bubble-text: #1b1b22;

      --accent: #8a63f6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f3f2fa, #eceaf7 50%, #f7f6fc);
      font: 15px/1.45 system-ui, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* FULL HEIGHT CHAT WRAPPER */
    .phone {
      width: 100%;
      max-width: 520px;
      height: 100vh;               /* fill page vertically */
      background: var(--panel);
      border-radius: 22px;

      display: flex;
      flex-direction: column;
      overflow: hidden;

      border: 1px solid #e3e1ef;
      box-shadow: 0 20px 40px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.04);
    }

    header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: white;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 10px;
      font-weight: 600;
      color: #262633;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin: 4px 0 4px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #faf9ff;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      transition: border .2s;
    }
    input:focus {
      border-color: var(--accent);
      background: white;
    }

    .sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    /* CHAT LOG AREA */
    .log {
      flex: 1;                       /* grow to fill vertical space */
      padding: 20px;
      overflow-y: auto;
      background: white;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 40px 12px;
      font-size: 14px;
    }

    /* Chat bubbles */
    .msg {
      max-width: 85%;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 18px;
      word-wrap: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .msg.me {
      margin-left: auto;
      background: var(--me);
      color: #1d133a;
      border-bottom-right-radius: 6px;
    }

    .msg.bot {
      background: var(--bot);
      color: var(--bubble-text);
      border-bottom-left-radius: 6px;
    }

    .meta {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.8;
      margin-top: 6px;
    }

    /* MESSAGE COMPOSER */
    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      background: white;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #faf9ff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      transition: border .25s, box-shadow .25s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(138,99,246,.15);
      background: white;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      resize: none;
      min-height: 26px;
      max-height: 120px;
      padding: 6px 8px;
      outline: none;
      font-size: 15px;
    }

    .send {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      margin-left: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(138,99,246,.35);
      transition: background .2s;
    }
    .send:hover {
      background: #7c56e8;
    }
  </style>
</head>

<body>

<div class="phone">

<header>
  <h1>Book Appointment Agent</h1>
  <label>Endpoint</label>
  <input id="chatUrl" value="https://agents.nonnenmacher.tech/agents/appointment/chat" />
  <div class="sub">This chat sends a fake JWT for debugging only.</div>
</header>

<main id="log" class="log">
  <div class="empty">Start by sending a message below.</div>
</main>

<form id="composer" class="composer">
  <div class="input-wrap">
    <textarea id="msg" placeholder="Type your message…" rows="1"></textarea>
    <button id="send" class="send" type="submit">➤</button>
  </div>
</form>

</div>

<script>
/* ---------------------------------------
   DO NOT MODIFY — ORIGINAL LOGIC INTACT
----------------------------------------*/

const $ = q => document.querySelector(q);

$("#msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    $("#send").click();
  }
});

function md(x){ return x.replace(/\n/g,"<br>"); }
function timeStr(){ return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

const messages = [];
const fakeToken =
  "eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJ1c2VyX2lkIjoxLCJwYXRpZW50X2lkIjoxfQ.";

let conversationId = null;

function render(){
  const log = $("#log");
  log.innerHTML = "";
  if(!messages.length){
    log.innerHTML = '<div class="empty">Start by sending a message below.</div>';
  } else {
    messages.forEach(m=>{
      log.innerHTML += `
        <div class="msg ${m.role}">
          <div class="body">${m.role === "me" ? m.text : md(m.text)}</div>
          <div class="meta">${timeStr()}</div>
        </div>`;
    });
    log.scrollTop = log.scrollHeight + 512;
  }
}

$("#composer").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const text = $("#msg").value.trim();
  if(!text) return;

  const url = $("#chatUrl").value.trim();

  messages.push({ role:"me", text });
  $("#msg").value = "";
  render();

  const body = {
    channel: "bayleaf_app",
    patient_id: null,
    message: text,
    conversation_id: conversationId,
    lang: "en-US"
  };

  const res = await fetch(url, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": `Bearer ${fakeToken}`
    },
    body: JSON.stringify(body)
  });

  const raw = await res.text();
  let json;
  try { json = JSON.parse(raw); } catch { json = { reply: raw }; }

  if (json.conversation_id) {
    conversationId = json.conversation_id;
  }

  messages.push({
    role:"bot",
    text: json.reply ?? "(no response)"
  });

  render();
});

render();
</script>

</body>
</html>
